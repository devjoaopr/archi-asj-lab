services:

  customer-db:
    image: postgres:17
    container_name: customer-db

    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: joao
      POSTGRES_PASSWORD: joaodev

    ports:
      - "5435:5432"

    volumes:
      - customerdb:/var/lib/postgresql/data

    networks:
      - archi-net

  case-db:
    image: postgres:17
    container_name: case-db

    environment:
      POSTGRES_DB: casedb
      POSTGRES_USER: joao
      POSTGRES_PASSWORD: joaodev

    ports:
      - "5436:5432"

    volumes:
      - casedb:/var/lib/postgresql/data

    networks:
      - archi-net

  notification-db:
    image: postgres:17
    container_name: notification-db

    environment:
      POSTGRES_DB: notificationdb
      POSTGRES_USER: joao
      POSTGRES_PASSWORD: joaodev

    ports:
      - "5438:5432"

    volumes:
      - notificationdb:/var/lib/postgresql/data

    networks:
      - archi-net

  postgres-keycloak:
    image: postgres:17-alpine
    container_name: postgres-keycloak

    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak

    ports:
      - "5437:5432"

    volumes:
      - postgres_keycloak_data:/var/lib/postgresql/data

    networks:
      - archi-net

    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak
    container_name: keycloak-container

    command: start-dev

    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak

      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

    ports:
      - "8088:8080"

    networks:
      - archi-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:

      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - archi-net

  zookeeper:

    image: confluentinc/cp-zookeeper:7.6.1

    container_name: zookeeper

    environment:

      ZOOKEEPER_CLIENT_PORT: 2181

    networks:
      - archi-net

  eureka-server:

    build:
      context: ../eureka-server/eureka-server

    container_name: eureka-server

    ports:
      - "8761:8761"

    networks:
      - archi-net

  customer-service:

    build:
      context: ../services/customer

    container_name: customer-service

    depends_on:
      - customer-db
      - kafka
      - eureka-server

    ports:
      - "8083:8083"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://customer-db:5432/customerdb

      SPRING_DATASOURCE_USERNAME: joao

      SPRING_DATASOURCE_PASSWORD: joaodev

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

    networks:
      - archi-net

  kafka-ui:

    image: provectuslabs/kafka-ui

    container_name: kafka-ui

    depends_on:
      - kafka

    ports:
      - "8085:8080"

    environment:

      KAFKA_CLUSTERS_0_NAME: local

      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

    networks:
      - archi-net

  notification-service:

    build:
      context: ../services/notification-api

    container_name: notification-service

    depends_on:
      - notification-db
      - kafka
      - eureka-server

    ports:
      - "8086:8086"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notificationdb

      SPRING_DATASOURCE_USERNAME: joao

      SPRING_DATASOURCE_PASSWORD: joaodev

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

    networks:
      - archi-net

  case-service:

    build:
      context: ../services/case

    container_name: case-service

    depends_on:
      - case-db
      - kafka
      - eureka-server

    ports:
      - "8084:8084"

    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://case-db:5432/casedb

      SPRING_DATASOURCE_USERNAME: joao

      SPRING_DATASOURCE_PASSWORD: joaodev

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

    networks:
      - archi-net

  gateway-service:

    build:
      context: ../gateway

    container_name: gateway-service

    depends_on:
      - keycloak
      - eureka-server

    ports:
      - "8087:8080"

    environment:

      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/

      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:
        http://keycloak-container:8080/realms/archlab

    networks:
      - archi-net

networks:

  archi-net:

volumes:

  customerdb:

  casedb:

  notificationdb:

  postgres_keycloak_data: