server:
  port: 8081

spring:
  application:
    name: gateway

  cloud:
    gateway:
      mvc:
        http-client:
          type: restclient

    loadbalancer:
      eager-load:
        clients:
          - customer-service
          - case-service
          - register-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8088/realms/archlab
          jwk-set-uri: http://keycloak:8080/realms/archlab/protocol/openid-connect/certs

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.cloud.loadbalancer: DEBUG

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

