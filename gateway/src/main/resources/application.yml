server:
  port: 8081

spring:
  application:
    name: gateway
  cloud:
    gateway:
      mvc:
        http-client:
          type: restclient
        routes:
          - id: test-route
            uri: https://httpbin.org
            predicates:
              - Path=/test/**
            filters:
              - RewritePath=/test/(?<segment>.*), /$\{segment}
              - name: CircuitBreaker
                args:
                  name: authService
                  fallbackUri: forward:/fallback/test

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/archlab

logging:
  pattern:
    console: "%d{HH:mm:ss} [%X{correlationId}] %-5level %logger - %msg%n"
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty.http.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    gateway:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    ip-address: 127.0.0.1
    hostname: localhost

resilience4j:
  circuitbreaker:
    instances:
      authService:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

  retry:
    instances:
      authService:
        max-attempts: 3
        wait-duration: 1s

  timelimiter:
    instances:
      authService:
        timeout-duration: 3s