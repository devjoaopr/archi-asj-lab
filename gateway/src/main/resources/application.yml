server:
  port: 8081

spring:
  application:
    name: gateway

  cloud:
    gateway:
      mvc:
        http-client:
          type: restclient

    loadbalancer:
      eager-load:
        clients:
          - customer-service
          - case-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/archlab

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true