services:
  case-db:
    image: postgres:17
    container_name: case-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: casedb
      POSTGRES_USER: joao
      POSTGRES_PASSWORD: joaodev

    ports:
      - "5436:5432"

    volumes:
      - customer_pgdata:/var/lib/postgresql/data

volumes:
  customer_pgdata: